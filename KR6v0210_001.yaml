body:
  text: 之一碑陽法師劉洪安馮道錄生馮光三洞法師王平定渥陽縣傅永洛造馮道勝錄生馮伯端三洞法師牛重蔭三洞法師郗孫馮道錄生馮同成錄生真道民馮世紹施地立壇息馮道度馮神苻錄生馮永興道士洛高生錄生馮世安錄生馮洪族錄生馮洪莢錄生馮樹玉馮道秀錄生馮道起錄生馮洪虯錄生馮道養錄生馮神安錄馮凡錄生馮道鳳錄生馮洪明錄生馮神養道民馮今保邑子馮思善邑子馮神縱邑子馮大善邑子趙林桀邑子祁令標邑子馮神緯邑子馮道興邑子馮仵龍邑子馮文歡邑子馮世欽邑子馮龍引門師張明玉邑子馮道豐邑子趙林坊邑子馮真苻邑子祁令宋邑子馮神育邑子馮道多邑師馮洪標邑子馮道欽邑子馮洪哲邑子馮神護邑子馮道初邑子祁令智邑子馮神憙邑子馮天勗邑子馮洪辨邑子馮伯引邑子馮道憘邑子馮文好道民祁孟孫道士李之二碑陰李貴姬袁醜女尹思香袁照姬藺英武馮標姬馮巍姬楊三姬辛勝姜李公主劉要勝楊銀姜張白鳳焦潤姜劉男香趙苟女梁慈姜馮蠻蟟楊樂姬王洪姬王阿正李女多柏桃姬王阿水邑子楊鳳姬楊阿俄王好姬趙阿女張叔姬姜仵男邑子王清姜尹醜女楊今英楊金光郭伯媚柏桃花楊雙媚孫道姜郭神女趙青女馮華姿趙桃迎柏醜姬趙妙姬袁女賜李巧女劉阿光劉白佛張武媚趙林姬王阿迴牛令姜董三女劉文姬李阿解祁男引蕭勝光趙阿勝趙女王段道女之三碑側馮道民馮元賜道民馮周道士馮盛道士馮還盛息馮神覆道民馮德道民神民趙道生錄生張道生邑子馮道太邑子馮思政邑子馮黑退邑子馮買德邑子馮世起邑子馮道明邑子馮神貴邑子馮神哲邑子馮子興邑子馮顯保邑子馮伯疆邑子馮世慶邑子馮興宋邑子馮神生邑子馮市買邑子趙皇頭邑子馮道扶邑子祁伯胡邑子馮世標邑子馮文尚邑子馮市虎邑子馮始隆邑子馮道蓋邑子馮子馮洛周邑子馮儀世邑子馮道穆邑子馮世豪妻王化之四碑側錄生楊洪超錄生郭錄生楊洪標清信士馮邑子柏丞公邑子柏安和邑子柏安起邑祁阿小邑子趙淮業邑子馮安郡邑子柏惟慶邑子張迴生邑子祁市生邑子張道隆馮連苻馮連光夫幽宗玄寂真麗潛暉然隱顯沖機而名隨化浪洪闡彌廓遐瑍超倫雖含養群生妙容難尋自非鏤像汙形其熟能覩之者哉大代正始二年秋九月己巳朔廿六日甲午真道民馮神育同邑二百人等投委壇靜仰追冥果造立石像永式歸虔願帝主熙隆百恭肅祚延無窮尊師崇業諸邑七世以來生緣眷屬住居常樂恒在願從心常与善緣大道普同慈覆願從心合邑二百廿人造石像一區弟立名字若有人刊試者身入地獄邑海邑子馮道宜邑子馮道集邑子馮黑退邑子馮超宗邑子祁次孫道民馮弘威
